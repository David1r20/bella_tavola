name: CI Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qualidade:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnostico do ambiente
        run: |
          echo "=== Python ==="
          python --version
          echo "=== Dependencias instaladas ==="
          pip list
          echo "=== Arquivos centrais ==="
          test -f main.py && echo "main.py encontrado" || echo "main.py ausente"
          test -f requirements.txt && echo "requirements.txt encontrado" || echo "requirements.txt ausente"
          test -d tests && echo "tests/ encontrado" || echo "tests/ ausente"
          test -f ml/model_utils.py && echo "ml/model_utils.py encontrado" || echo "ml/model_utils.py ausente"

      - name: Verificar formatacao
        run: black --check .

      - name: Verificar imports nao utilizados
        run: autoflake --check --remove-all-unused-imports -r .

      - name: Rodar testes smoke
        run: pytest tests/ -m smoke -v --tb=short

  integracao:
    runs-on: ubuntu-latest
    needs: qualidade
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache do modelo Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('requirements.txt') }}

      - name: Diagnostico de integracao
        run: |
          echo "=== Python ==="
          python --version
          test -f ml/model_utils.py && echo "ml/model_utils.py encontrado" || echo "ml/model_utils.py ausente"
          if [ -n "$HF_TOKEN" ]; then echo "HF_TOKEN definido"; else echo "HF_TOKEN ausente"; fi
          if [ -n "$HF_MODEL_REPO_ID" ]; then echo "HF_MODEL_REPO_ID definido"; else echo "HF_MODEL_REPO_ID ausente"; fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO_ID: ${{ vars.HF_MODEL_REPO_ID }}

      - name: Verificar autenticacao com Hugging Face
        run: python -c "import os; assert os.environ.get('HF_TOKEN'), 'HF_TOKEN nao configurado'; assert os.environ.get('HF_MODEL_REPO_ID'), 'HF_MODEL_REPO_ID nao configurado'"
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO_ID: ${{ vars.HF_MODEL_REPO_ID }}

      - name: Rodar testes de integracao
        run: pytest tests/ -m integracao -v --tb=short
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO_ID: ${{ vars.HF_MODEL_REPO_ID }}


  docker:
    runs-on: ubuntu-latest
    needs: integracao
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/bella-tavola:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  relatorio:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Resumo do pipeline
        run: |
          echo "Pipeline CI do Bella Tavola concluido"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"
